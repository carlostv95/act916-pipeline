<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Project Pipeline — ACT 916</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #fafaf8;
    --bg-soft: #f4f3ef;
    --surface: #ffffff;
    --line: #e7e5e0;
    --line-strong: #d6d3cd;
    --ink: #18181b;
    --ink-2: #3f3f46;
    --ink-3: #71717a;
    --ink-4: #a1a1aa;
    --accent: #4f46e5;
    --accent-soft: #eef2ff;
    --green: #16a34a;
    --green-soft: #ecfdf5;
    --amber: #d97706;
    --amber-soft: #fef3c7;
    --red: #dc2626;
    --red-soft: #fee2e2;
    --shadow-sm: 0 1px 2px rgba(24,24,27,0.04);
    --shadow-md: 0 1px 2px rgba(24,24,27,0.04), 0 4px 12px rgba(24,24,27,0.04);
    --radius: 10px;
    --radius-sm: 6px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "cv11","ss01","ss03";
  }
  .mono{font-family: 'JetBrains Mono', ui-monospace, monospace}
  .app{
    max-width: 1480px;
    margin: 0 auto;
    padding: 28px 32px 80px;
  }
  /* HEADER */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 16px;
    margin-bottom: 24px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap: 10px;
  }
  .logo-mark{
    width:28px;height:28px;border-radius:7px;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    display:flex;align-items:center;justify-content:center;
    color:white; font-weight:700; font-size:14px;
    box-shadow: var(--shadow-sm);
  }
  .brand-name{font-weight:600; font-size:15px; letter-spacing:-0.01em}
  .brand-sub{color:var(--ink-3); font-size:12px; margin-top:1px}
  .topbar-actions{display:flex; align-items:center; gap:8px}

  /* BUTTONS */
  .btn{
    display:inline-flex; align-items:center; gap:6px;
    padding: 7px 12px;
    border: 1px solid var(--line-strong);
    background: var(--surface);
    border-radius: var(--radius-sm);
    font: inherit; font-size:13px; font-weight:500;
    color: var(--ink-2);
    cursor:pointer;
    transition: all .12s ease;
    box-shadow: var(--shadow-sm);
  }
  .btn:hover{ background: var(--bg-soft); color: var(--ink); border-color: #c4c0b8 }
  .btn.primary{ background: var(--ink); color: white; border-color: var(--ink) }
  .btn.primary:hover{ background:#27272a; color:white }
  .btn.ghost{ box-shadow:none; border-color: transparent; background: transparent }
  .btn.ghost:hover{ background: var(--bg-soft) }
  .btn .icon{width:14px;height:14px;flex:0 0 14px}
  .btn.sm{padding:4px 8px; font-size:12px}

  /* WEEK SELECTOR */
  .week-bar{
    display:flex; align-items:center; gap: 14px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
  }
  .week-nav{display:flex; align-items:center; gap:4px}
  .week-nav button{
    width:28px;height:28px;border-radius:6px;
    border: 1px solid var(--line);
    background: var(--surface);
    cursor:pointer; color:var(--ink-2);
    display:flex;align-items:center;justify-content:center;
  }
  .week-nav button:hover:not(:disabled){background: var(--bg-soft)}
  .week-nav button:disabled{opacity:.4; cursor:not-allowed}
  .week-label{
    flex:1;
    display:flex; flex-direction:column;
  }
  .week-label-row{display:flex; align-items:baseline; gap:10px}
  .week-num{font-weight:600; font-size:15px; letter-spacing:-0.01em}
  .week-range{color: var(--ink-3); font-size:12px}
  .week-meta{font-size:12px; color: var(--ink-3); margin-top:2px}
  .week-list{
    display:flex; gap:6px; align-items:center; overflow-x:auto;
    max-width: 380px; padding: 2px 0;
  }
  .week-pill{
    padding: 5px 10px;
    font-size:12px; font-weight:500;
    border-radius:999px;
    background: var(--bg-soft);
    color: var(--ink-3);
    border: 1px solid transparent;
    cursor:pointer; white-space:nowrap;
  }
  .week-pill:hover{background: #ebe9e3}
  .week-pill.active{background: var(--ink); color:white}

  /* SUMMARY STRIP */
  .summary{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  .stat{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow-sm);
  }
  .stat-label{
    font-size:11px; color:var(--ink-3);
    text-transform: uppercase; letter-spacing:.06em;
    font-weight:500;
  }
  .stat-value{
    font-size: 26px; font-weight:600;
    letter-spacing:-0.02em;
    margin-top:4px;
    display:flex; align-items:baseline; gap:6px;
  }
  .stat-value .unit{font-size:13px; color:var(--ink-3); font-weight:500}
  .stat-bar{
    margin-top:10px; height:4px; background: var(--bg-soft);
    border-radius:999px; overflow:hidden;
  }
  .stat-bar > div{height:100%; border-radius:999px; transition: width .3s}
  .stat .row{display:flex; justify-content:space-between; align-items:center; gap:8px}
  .delta{font-size:12px; font-weight:500}

  /* PHOTO STRIP */
  .photo-strip{
    display:flex; gap:12px; align-items:stretch;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
  }
  .photo-thumb{
    width: 88px; height: 64px;
    border-radius: 6px;
    background: repeating-linear-gradient(45deg, #f4f3ef, #f4f3ef 6px, #ebe9e3 6px, #ebe9e3 12px);
    overflow:hidden;
    border: 1px solid var(--line);
    flex: 0 0 88px;
    cursor:pointer;
    position:relative;
  }
  .photo-thumb img{width:100%; height:100%; object-fit:cover; display:block}
  .photo-meta{flex:1; display:flex; flex-direction:column; justify-content:space-between; min-width:0}
  .photo-title{font-weight:500; font-size:13px}
  .photo-sub{color:var(--ink-3); font-size:12px; margin-top:2px}
  .photo-actions{display:flex; gap:6px; align-items:center}
  .photo-overlay{
    position:fixed; inset:0; background: rgba(24,24,27,0.85);
    display:flex; align-items:center; justify-content:center;
    z-index: 60; padding: 32px;
  }
  .photo-overlay img{max-width:100%; max-height:100%; border-radius:8px; box-shadow: 0 24px 60px rgba(0,0,0,.5)}
  .photo-overlay .close{
    position:absolute; top:16px; right:16px;
    width:36px;height:36px;border-radius:8px;
    background: rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
    color:white; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }

  /* TABLE / PIPELINE */
  .pipeline{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow:hidden;
  }
  .pipeline-toolbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 12px 18px;
    background: var(--bg-soft);
    border-bottom: 1px solid var(--line);
  }
  .pipeline-title{
    font-size: 11px; text-transform: uppercase; letter-spacing:.08em;
    color: var(--ink-3); font-weight:600;
  }
  .toolbar-actions{display:flex; gap:6px}

  /* PROJECT (group) */
  .project{
    border-bottom: 1px solid var(--line);
    transition: background .12s;
    position:relative;
  }
  .project:last-of-type{border-bottom:none}
  .project.focus-dim{opacity:.35; pointer-events:none}
  .project.focus-pin{
    background: linear-gradient(90deg, rgba(254,242,242,.4), transparent 50%);
  }

  .project-head{
    display:grid;
    grid-template-columns: 22px 24px 1fr auto 110px 88px 90px 32px !important;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    transition: background .12s;
  }
  .project-head:hover{background: #fbfaf7}
  .twirl{
    width:22px; height:22px;
    border:none; background: transparent;
    color: var(--ink-3);
    cursor:pointer; padding: 0;
    display:flex; align-items:center; justify-content:center;
    border-radius: 4px;
    transition: transform .15s;
  }
  .twirl:hover{background: var(--bg-soft); color: var(--ink)}
  .twirl.collapsed svg{transform: rotate(-90deg)}
  .twirl svg{width:14px; height:14px; transition: transform .15s}

  .row-num{
    color: var(--ink-4);
    font-size: 12px;
    font-weight:500;
  }

  .project-title-wrap{min-width:0}
  .project-title{
    font-weight:600; font-size:15px; letter-spacing:-0.01em;
    color: var(--ink);
    line-height:1.25;
  }
  .project-note{
    font-size:12px; color: var(--ink-3); margin-top:2px;
  }

  .project-meta{display:flex; align-items:center; gap:8px}
  .count-pill{
    background: var(--bg-soft);
    border: 1px solid var(--line);
    color: var(--ink-3);
    font-size: 11px; font-weight:500;
    padding: 2px 8px; border-radius: 999px;
    white-space:nowrap;
  }

  .project-progress{display:flex; flex-direction:column; gap:5px; min-width:80px}
  .project-progress .progress-bar{height:5px}
  .progress-num.small{font-size:12px; color: var(--ink-2); display:flex; align-items:baseline; gap:3px}
  .progress-num.small .of{color: var(--ink-4)}

  .project-status{display:flex; align-items:center; justify-content:flex-start}

  .project-actions{display:flex; gap:4px; opacity:0; transition: opacity .12s}
  .project-head:hover .project-actions{opacity:1}
  .project-actions button, .sub-actions button{
    width:24px; height:24px;
    border:1px solid var(--line);
    background: var(--surface);
    border-radius:5px;
    cursor:pointer;
    color: var(--ink-3);
    display:flex; align-items:center; justify-content:center;
  }
  .project-actions button:hover, .sub-actions button:hover{
    background: var(--bg-soft); color: var(--red); border-color: #fecaca;
  }
  .project-actions svg, .sub-actions svg{width:12px;height:12px}

  /* CLIENTS */
  .clients{
    background: #fbfaf7;
    border-top: 1px solid var(--line);
    padding: 0 0 6px;
  }
  .metric-head{
    display:grid;
    grid-template-columns: 44px 0.85fr 22px 1.4fr 22px 1.4fr 0.85fr 0.85fr 30px;
    gap: 10px;
    padding: 8px 18px 8px 0;
    font-size: 10px; text-transform: uppercase; letter-spacing:.06em;
    color: var(--ink-4); font-weight:600;
    border-bottom: 1px dashed var(--line);
  }
  .client{
    border-bottom: 1px solid rgba(0,0,0,0.04);
  }
  .client.last-client{border-bottom:none}
  .client-head{
    display:grid;
    grid-template-columns: 22px 1fr auto 110px auto 28px;
    gap: 10px;
    align-items:center;
    padding: 8px 18px 8px 22px;
    background: rgba(0,0,0,0.025);
    font-size: 12px;
  }
  .client-name{
    font-weight: 600;
    color: var(--ink);
    font-size: 13px;
  }
  .client-meta{display:flex; gap:6px}
  .client-progress{display:flex; flex-direction:column; gap:3px; align-items:flex-end; min-width:80px}
  .client-progress .small{font-size:11px; color:var(--ink-2)}
  .mini-bar{height:3px; width:80px; background:var(--bg-soft); border-radius:999px; overflow:hidden}
  .mini-bar > div{height:100%; border-radius:999px}
  .client-status .status.sm{font-size:10px; padding:2px 6px}
  .client-actions button{
    width:22px; height:22px;
    border:1px solid var(--line);
    background: var(--surface);
    border-radius:5px;
    cursor:pointer;
    color: var(--ink-3);
    display:flex; align-items:center; justify-content:center;
    opacity:0; transition: opacity .1s;
  }
  .client-head:hover .client-actions button{opacity:1}
  .client-actions button:hover{background: var(--bg-soft); color: var(--red); border-color: #fecaca}
  .client-actions svg{width:11px; height:11px}
  .twirl.small{width:18px; height:18px}
  .twirl.small svg{width:11px; height:11px}

  .metrics{padding: 4px 0}

  /* METRIC ROW */
  .metric-row{
    display:grid;
    grid-template-columns: 44px 0.85fr 22px 1.4fr 22px 1.4fr 0.85fr 0.85fr 30px;
    gap: 10px;
    align-items: start;
    padding: 8px 18px 8px 0;
    transition: background .1s;
    position:relative;
  }
  .metric-row:hover{background: rgba(0,0,0,0.015)}

  .m-tree{
    position:relative;
    width:44px;
    display:flex; align-items:center; justify-content:center;
    align-self: stretch;
  }
  .m-line{
    position:absolute;
    left: 30px;
    top: 0; bottom: 0;
    width: 1px;
    background: var(--line-strong);
  }
  .m-line.last{ bottom: 50%; }
  .m-bullet{
    position:absolute;
    left: 26px; top: calc(50% - 1px);
    width: 9px; height: 1px;
    background: var(--line-strong);
  }
  .m-bullet::after{
    content: '';
    position:absolute;
    right: -3px; top: -2px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--ink-4);
  }

  .m-cell{
    font-size: 13px; line-height: 1.4;
    color: var(--ink-2);
    min-width: 0;
    word-break: break-word;
    padding-top: 4px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .m-cell.label{font-weight:500; color: var(--ink); font-family: 'JetBrains Mono', monospace; font-size:12px}
  .m-arrow{
    color: var(--ink-4);
    display:flex; align-items:flex-start; justify-content:center;
    padding-top: 10px;
  }
  .m-arrow svg{width:12px;height:12px}
  .m-desc{font-size:13px; color:var(--ink-2); line-height:1.35}
  .m-num{
    display:inline-flex; align-items:baseline; gap:5px;
  }
  .m-num-label{
    font-size:10px; color:var(--ink-4); text-transform:uppercase;
    letter-spacing:.04em; font-weight:500;
  }

  .numinput{
    width:46px;
    border: 1px solid var(--line);
    background: var(--surface);
    border-radius: 5px;
    padding: 3px 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight:600;
    color: var(--ink);
    text-align: center;
    outline: none;
    transition: border-color .1s, background .1s;
  }
  .numinput:hover{border-color: var(--line-strong)}
  .numinput:focus{border-color: var(--accent); background: var(--accent-soft)}
  .numinput.big{
    width: 54px;
    font-size: 15px;
    padding: 5px 6px;
    font-weight: 700;
  }

  /* DISCREPANCIA */
  .gap-cell{align-items:flex-start}
  .gap-num{
    display:inline-flex; align-items:baseline; gap:3px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 16px;
    padding: 2px 8px;
    border-radius: 5px;
  }
  .gap-num.has-gap{ background: #fee2e2; color: #b91c1c }
  .gap-num.over{ background: #dcfce7; color: #15803d }
  .gap-num.zero{ background: var(--bg-soft); color: var(--ink-4) }
  .gap-num .gap-sign{font-size:14px; opacity:.8}
  .gap-bar{
    height:4px; background: var(--bg-soft);
    border-radius: 999px; overflow:hidden;
    width: 100%;
    margin-top: 4px;
  }
  .gap-bar > div{height:100%; border-radius:999px; transition: width .3s}

  /* WEEK CELL */
  .week-cell{
    align-items: flex-start;
    position: relative;
  }
  .week-input-wrap{
    display:inline-flex; align-items:baseline; gap:6px;
    padding: 4px 8px;
    background: linear-gradient(135deg, rgba(79,70,229,0.08), rgba(124,58,237,0.04));
    border: 1px solid rgba(79,70,229,0.15);
    border-radius: 6px;
  }
  .week-pulse{
    position: absolute;
    top: 6px; right: 8px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4f46e5;
    box-shadow: 0 0 0 0 rgba(79,70,229,0.4);
    animation: weekPulse 2s ease-out infinite;
  }
  @keyframes weekPulse{
    0%{box-shadow: 0 0 0 0 rgba(79,70,229,0.4)}
    70%{box-shadow: 0 0 0 8px rgba(79,70,229,0)}
    100%{box-shadow: 0 0 0 0 rgba(79,70,229,0)}
  }

  .m-actions{
    display:flex; align-items:flex-start; padding-top: 4px;
    opacity: 0; transition: opacity .1s;
  }
  .metric-row:hover .m-actions{opacity:1}
  .m-actions button{
    width:22px; height:22px;
    border:1px solid var(--line);
    background: var(--surface);
    border-radius:5px;
    cursor:pointer;
    color: var(--ink-3);
    display:flex; align-items:center; justify-content:center;
  }
  .m-actions button:hover{background: var(--bg-soft); color: var(--red); border-color: #fecaca}
  .m-actions svg{width:11px; height:11px}

  .add-metric, .add-client{
    display:flex; align-items:center; gap:8px;
    margin: 4px 18px 8px 44px;
    padding: 6px 10px;
    background: transparent;
    border: 1px dashed var(--line-strong);
    border-radius: 6px;
    color: var(--ink-3);
    font: inherit; font-size: 11px; font-weight:500;
    cursor:pointer;
  }
  .add-client{margin: 8px 18px 12px}
  .add-metric:hover, .add-client:hover{background: var(--surface); color: var(--ink-2); border-color: var(--ink-4)}
  .add-metric svg, .add-client svg{width:11px; height:11px}

  /* PROJECT week column extras */
  .project-week{display:flex; flex-direction:column; align-items:flex-start; gap:2px}
  .week-mini{
    display:inline-flex; align-items:baseline; gap:4px;
    background: linear-gradient(135deg, rgba(79,70,229,0.1), rgba(124,58,237,0.05));
    border: 1px solid rgba(79,70,229,0.18);
    border-radius: 6px;
    padding: 3px 8px;
  }
  .week-mini-num{font-size:13px; font-weight:600; color:#4f46e5}

  .gap-inline{
    margin-left: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #b91c1c;
    font-weight: 600;
  }

  .editable{
    cursor:text;
    border-radius: 5px;
    padding: 1px 4px;
    margin: -1px -4px;
    transition: background .1s;
  }
  .editable:hover{background: #f4f3ef}
  .editable:focus{
    background: var(--accent-soft);
    outline: 1px solid var(--accent);
    outline-offset: 0;
  }
  .editable.empty::before{
    content: attr(data-placeholder);
    color: var(--ink-4);
    font-style: italic;
  }

  /* PROGRESS */
  .progress-wrap{display:flex; flex-direction:column; gap:6px; padding-top:2px}
  .progress-num{
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight:500;
    color: var(--ink-2);
    display:flex; align-items:baseline; gap:3px;
  }
  .progress-num .of{color: var(--ink-4); font-weight:400}
  .progress-bar{
    height: 4px; background: var(--bg-soft);
    border-radius: 999px; overflow:hidden;
  }
  .progress-bar > div{
    height:100%; border-radius:999px; transition: width .3s;
  }

  /* STATUS */
  .status{
    display:inline-flex; align-items:center; gap:6px;
    padding: 3px 8px 3px 7px;
    border-radius: 999px;
    font-size: 11px; font-weight:500;
    border: 1px solid;
    white-space:nowrap;
    align-self: flex-start;
    margin-top: 2px;
  }
  .status .dot{width:6px;height:6px;border-radius:50%}
  .status.on{ background: var(--green-soft); border-color:#bbf7d0; color:#15803d }
  .status.on .dot{background:#16a34a}
  .status.at{ background: var(--amber-soft); border-color:#fde68a; color:#a16207 }
  .status.at .dot{background:#d97706}
  .status.off{ background: var(--red-soft); border-color:#fecaca; color:#b91c1c }
  .status.off .dot{background:#dc2626}
  .status.none{ background: var(--bg-soft); border-color: var(--line-strong); color: var(--ink-3) }
  .status.none .dot{background: var(--ink-4)}

  /* ADD ROW */
  .add-row{
    padding: 14px 18px;
    text-align:left;
    color: var(--ink-3);
    font-size: 13px;
    cursor:pointer;
    border-top: 1px dashed var(--line-strong);
    background: transparent;
    width: 100%;
    border-left: none; border-right: none; border-bottom: none;
    font-family: inherit;
    display:flex; align-items:center; gap:8px;
  }
  .add-row:hover{background: var(--bg-soft); color: var(--ink-2)}

  /* GAP EMPHASIS (intensity 0-3) */
  body{ --gap-int: 0.5; }
  .gap-badge{
    display: inline-flex; align-items: center;
    background: #fee2e2; color: #b91c1c;
    border: 1px solid #fecaca;
    font-size: 10px; font-weight: 600;
    padding: 1px 6px; border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    margin-left: 8px;
    letter-spacing: -0.02em;
  }
  body[data-gap-int="0"] .gap-badge{ display: none }
  body[data-gap-int="0"] .m-cell.actual.is-off{ color: var(--ink-2) }
  body[data-gap-int="1"] .m-cell.actual.is-off{
    background: linear-gradient(90deg, rgba(220,38,38,0.04), transparent 50%);
  }
  body[data-gap-int="2"] .m-cell.actual.is-off{
    color: #dc2626;
    background: rgba(220,38,38,0.06);
    border-radius: 4px;
    padding: 2px 6px;
    margin: 0 -6px;
  }
  body[data-gap-int="3"] .m-cell.actual.is-off{
    color: #b91c1c;
    background: rgba(220,38,38,0.1);
    border-radius: 4px;
    padding: 2px 6px;
    margin: 0 -6px;
    font-weight: 500;
  }
  body[data-gap-int="3"] .m-cell.target.is-missing::after{
    content: ' ◦ pendiente';
    color: #dc2626;
    font-size: 0.85em;
    font-weight: 600;
    margin-left: 4px;
  }

  /* FOCUS MODE */
  body.focus-mode .summary,
  body.focus-mode .photo-strip{display:none}

  /* FOCUS BANNER */
  .focus-banner{
    background: linear-gradient(90deg, #18181b, #27272a);
    color: #fafafa;
    border-radius: var(--radius);
    padding: 18px 22px;
    margin-bottom: 16px;
    display:flex; align-items:center; justify-content:space-between; gap:16px;
  }
  .focus-banner .label{font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:#a1a1aa; font-weight:600}
  .focus-banner .text{font-size: 16px; margin-top:4px; font-weight:500; letter-spacing:-0.01em}
  .focus-banner em{color:#fca5a5; font-style:normal}

  /* TOAST */
  .toast{
    position:fixed; bottom: 20px; left:50%; transform: translateX(-50%);
    background: var(--ink); color:white;
    padding: 10px 16px; border-radius: 8px;
    font-size: 13px; font-weight:500;
    box-shadow: 0 10px 30px rgba(0,0,0,.2);
    z-index: 80;
    animation: toastIn .25s ease;
  }
  @keyframes toastIn{from{opacity:0; transform:translate(-50%, 8px)} to{opacity:1; transform:translate(-50%, 0)}}

  /* SCROLLBAR FOR WEEK LIST */
  .week-list::-webkit-scrollbar{height:4px}
  .week-list::-webkit-scrollbar-thumb{background:var(--line-strong); border-radius:4px}

  /* ─────────── THEME: NOTEBOOK ─────────── */
  body.theme-notebook{
    --bg: #f5f1e6;
    --bg-soft: #ede6d3;
    --surface: #fdfaf0;
    --line: #d9cdb0;
    --line-strong: #b8a878;
    --ink: #2a2418;
    --ink-2: #4a3f29;
    --ink-3: #7a6a48;
    --ink-4: #a89878;
    --accent: #1d4ed8;
    background:
      repeating-linear-gradient(0deg, transparent 0, transparent 27px, rgba(120,90,40,0.08) 27px, rgba(120,90,40,0.08) 28px),
      var(--bg);
    font-family: 'Caveat', 'Bradley Hand', cursive;
  }
  body.theme-notebook .mono,
  body.theme-notebook .progress-num,
  body.theme-notebook .week-range,
  body.theme-notebook .row-num,
  body.theme-notebook input[type="text"]{
    font-family: 'JetBrains Mono', monospace !important;
  }
  body.theme-notebook .stat,
  body.theme-notebook .pipeline,
  body.theme-notebook .week-bar,
  body.theme-notebook .photo-strip{
    box-shadow: 1px 2px 0 rgba(120,90,40,0.15), 0 1px 0 rgba(120,90,40,0.1) inset;
    border-color: var(--line-strong);
    transform: rotate(-0.15deg);
  }
  body.theme-notebook .pipeline{transform: rotate(0.08deg)}
  body.theme-notebook .status{ border-style: dashed }
  body.theme-notebook .btn{ border-style: dashed; border-width: 1.5px }

  /* ─────────── THEME: TERMINAL ─────────── */
  body.theme-terminal{
    --bg: #0a0a0a;
    --bg-soft: #141414;
    --surface: #0f0f0f;
    --line: #2a2a2a;
    --line-strong: #3a3a3a;
    --ink: #e6f5d0;
    --ink-2: #b8d094;
    --ink-3: #7a8a5a;
    --ink-4: #4a5a3a;
    --accent: #4ade80;
    --accent-soft: #052e16;
    --green: #4ade80;
    --green-soft: #052e16;
    --amber: #fbbf24;
    --amber-soft: #2a1f00;
    --red: #f87171;
    --red-soft: #2a0a0a;
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
  }
  body.theme-terminal .gap-badge{ background: #2a0a0a; color: #f87171; border-color: #4a1a1a }
  body.theme-terminal .stat,
  body.theme-terminal .pipeline,
  body.theme-terminal .week-bar,
  body.theme-terminal .photo-strip,
  body.theme-terminal .focus-banner{
    background: var(--surface);
    border-color: var(--line);
    box-shadow: none;
  }
  body.theme-terminal .project-head:hover{ background: #1a1a1a }
  body.theme-terminal .logo-mark{ background: linear-gradient(135deg, #4ade80, #22c55e); color: #052e16 }
  body.theme-terminal .btn{ background: var(--surface); color: var(--ink-2); border-color: var(--line-strong) }
  body.theme-terminal .btn.primary{ background: #4ade80; color:#052e16; border-color:#4ade80 }
  body.theme-terminal .editable:hover{ background: #1a1a1a }
  body.theme-terminal .editable:focus{ background: #052e16; outline-color: #4ade80 }
  body.theme-terminal .stepper{ background: #0a0a0a; border-color: var(--line-strong) }
  body.theme-terminal .week-pill{ background: #1a1a1a; color: var(--ink-3) }
  body.theme-terminal .week-pill.active{ background: #4ade80; color: #052e16 }
  body.theme-terminal .count-pill{ background: #1a1a1a; border-color: var(--line); color: var(--ink-3) }
  body.theme-terminal .add-row{ color: var(--ink-3); border-color: var(--line-strong) }
  body.theme-terminal .add-row:hover{ background: #141414; color: var(--ink) }

  /* ─────────── LAYOUT: FUNNEL ─────────── */
  body.layout-funnel .pipeline{
    background: linear-gradient(90deg,
      var(--surface) 0%,
      var(--surface) 35%,
      rgba(220, 38, 38, 0.04) 100%);
  }
  body.layout-funnel .metric-row{
    grid-template-columns: 44px 1.4fr 22px 1.1fr 22px 0.85fr 0.85fr 0.85fr 30px;
  }
  body.layout-funnel .m-cell.label{
    background: var(--accent-soft);
    border-radius: 6px;
    padding: 6px 10px;
    margin: -3px -4px -3px 0;
  }
  body.layout-funnel .m-cell.target{
    background: var(--bg-soft);
    border-radius: 6px;
    padding: 6px 10px;
    margin: -3px -4px;
    border-left: 2px solid var(--ink-4);
  }
  body.layout-funnel .m-cell.actual{
    border-radius: 6px;
    padding: 6px 10px;
    margin: -3px 0 -3px -4px;
    background: rgba(220, 38, 38, 0.06);
    border-left: 2px solid #dc2626;
  }

  /* ─────────── LAYOUT: CARDS ─────────── */
  body.layout-cards .pipeline{
    background: transparent;
    border: none;
    box-shadow: none;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 14px;
    overflow: visible;
  }
  body.layout-cards .pipeline-toolbar{
    grid-column: 1 / -1;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
  }
  body.layout-cards .project{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  body.layout-cards .project-head{
    grid-template-columns: 22px 1fr auto 32px !important;
    padding: 14px 16px;
  }
  body.layout-cards .project-head .row-num,
  body.layout-cards .project-head .project-progress,
  body.layout-cards .project-head .project-week,
  body.layout-cards .project-head .project-status{ display: none }
  body.layout-cards .metric-row{
    grid-template-columns: 22px 1fr 14px 1fr 14px 1fr;
    padding: 8px 16px;
    font-size: 12px;
    gap: 6px;
  }
  body.layout-cards .metric-row > .gap-cell,
  body.layout-cards .metric-row > .week-cell,
  body.layout-cards .metric-row > .m-actions{ display: none }
  body.layout-cards .m-cell{ font-size: 12px; padding-top: 0 }
  body.layout-cards .m-tree{ width: 22px }
  body.layout-cards .m-line{ left: 14px }
  body.layout-cards .m-bullet{ left: 10px }
  body.layout-cards .add-row{
    grid-column: 1 / -1;
    background: var(--surface);
    border: 1px dashed var(--line-strong);
    border-radius: var(--radius);
  }
  body.layout-cards .project::after{
    content: '';
    display: block;
    height: 6px;
    background: linear-gradient(90deg,
      var(--proj-bar-color, #d4d4d8) calc(var(--proj-pct, 0) * 1%),
      var(--bg-soft) calc(var(--proj-pct, 0) * 1%));
  }

  /* ─────────── NOTION PANEL ─────────── */
  .notion-panel{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .notion-panel-header{
    display:flex; align-items:center; justify-content:space-between;
    padding: 11px 16px;
    cursor: pointer;
    user-select: none;
  }
  .notion-panel-header:hover{ background: var(--bg-soft); }
  .notion-panel-title{
    display:flex; align-items:center; gap:8px;
    font-weight:600; font-size:13px; color: var(--ink);
  }
  .notion-icon{
    width:20px; height:20px; border-radius:4px;
    background: #000; color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:800; flex-shrink:0;
  }
  .notion-badge{
    background: var(--accent); color:#fff;
    border-radius:999px; font-size:10px; font-weight:700;
    padding: 1px 6px; line-height:1.6;
  }
  .notion-gen-date{
    font-size:10px; color:var(--ink-4); font-weight:400;
  }
  .notion-panel-actions{
    display:flex; align-items:center; gap:8px;
  }
  .notion-body{
    border-top: 1px solid var(--line);
    padding: 10px 16px 6px;
  }
  .notion-empty{
    font-size:12px; color:var(--ink-3);
    padding: 8px 0 10px;
    line-height:1.5;
  }
  .notion-group{ margin-bottom:10px; }
  .notion-group-label{
    font-size:10px; font-weight:700; text-transform:uppercase;
    letter-spacing:.07em; color:var(--ink-3);
    margin-bottom:4px;
  }
  .notion-task-row{
    display:flex; align-items:center; gap:8px;
    padding: 5px 8px;
    border-radius: 6px;
    background: var(--bg-soft);
    margin-bottom:3px;
  }
  .notion-task-row:hover{ background: var(--bg); border: 1px solid var(--line); margin: -1px; margin-bottom:2px; }
  .notion-dot{
    width:7px; height:7px; border-radius:50%; flex-shrink:0;
  }
  .notion-dot.inprog{ background: #3b82f6; }
  .notion-dot.todo{ background: var(--line-strong); }
  .notion-task-name{
    flex:1; font-size:13px; color:var(--ink-2); min-width:0;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .notion-due{
    font-size:10px; color:var(--ink-4); font-family:'JetBrains Mono',monospace; flex-shrink:0;
  }
  .notion-hi{
    font-size:9px; font-weight:700; background:#fce7f3; color:#be185d;
    padding:1px 5px; border-radius:4px; flex-shrink:0;
  }
  .notion-plus-btn{
    flex-shrink:0;
    padding: 2px 8px;
    background: var(--accent-soft); color: var(--accent);
    border: 1px solid rgba(79,70,229,0.2);
    border-radius:5px; font-size:11px; font-weight:700;
    cursor:pointer; font-family:inherit;
    transition: background .1s;
  }
  .notion-plus-btn:hover{ background: var(--accent); color:#fff; }
  .notion-footer{
    border-top:1px solid var(--line); margin-top:6px; padding-top:6px;
    font-size:11px; color:var(--ink-4); text-align:right;
  }
  .notion-footer a{ color:var(--ink-3); text-decoration:none; }
  .notion-footer a:hover{ color:var(--accent); }

  /* Notion modal */
  .notion-overlay{
    position:fixed; inset:0;
    background: rgba(0,0,0,0.35);
    display:flex; align-items:center; justify-content:center;
    z-index:200;
  }
  .notion-modal{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    padding: 20px 22px;
    min-width: 320px; max-width:420px;
    display:flex; flex-direction:column; gap:10px;
  }
  .notion-modal-title{
    font-weight:700; font-size:14px; color:var(--ink);
  }
  .notion-modal-task{
    font-size:13px; color:var(--ink-3);
    background:var(--bg-soft); padding:6px 10px; border-radius:6px;
    font-style:italic;
  }
  .notion-modal select{
    width:100%; padding:7px 10px;
    border:1px solid var(--line-strong); border-radius:6px;
    background:var(--surface); color:var(--ink);
    font:inherit; font-size:13px;
    outline:none; cursor:pointer;
  }
  .notion-modal select:focus{ border-color:var(--accent); }
  .notion-modal-actions{
    display:flex; justify-content:flex-end; gap:8px; margin-top:4px;
  }

  /* UTIL */
  .sr-only{position:absolute;left:-9999px}
  .hidden{display:none !important}

  @media (max-width: 1100px){
    .metric-row{
      grid-template-columns: 44px 1fr 1fr 1fr 0.85fr 0.85fr 30px;
    }
    .metric-row .m-arrow{display:none}
    .summary{grid-template-columns: repeat(2, 1fr)}
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
